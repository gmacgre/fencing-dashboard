<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fencer Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 800px;
        }

        .fencer-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex: 1;
        }

        .fencer-panel h3 {
            margin: 0 0 20px 0;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            color: white;
            font-weight: bold;
        }

        .left-panel h3 {
            background: linear-gradient(135deg, #ff0000 0%, #dd3f76 100%);
        }

        .right-panel h3 {
            background: linear-gradient(135deg, #4CAF50 0%, #048f04 100%);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: darkorchid;
        }

        .actions {
            margin-top: 20px;
            text-align: center;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 5px;
            transition: background-color 0.2s;
        }

        button:hover {
            background: #45a049;
        }

        .clear-btn {
            background: #f44336;
        }

        .clear-btn:hover {
            background: #da190b;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Fencer -->
        <div class="fencer-panel left-panel">
            <h3>Fencer on the Left</h3>
            <div class="form-group">
                <label for="left-dropdown">Previous Fencers:</label>
                <select id="left-dropdown">
                    <option value="none">Fencer (BFC) -- Pronouns</option>
                </select>
            </div>
            <div class="form-group">
                <label for="left-name">Name:</label>
                <input type="text" id="left-name" placeholder="Enter fencer's name">
            </div>
            <div class="form-group">
                <label for="left-pronouns">Pronouns:</label>
                <input type="text" id="left-pronouns" placeholder="e.g., they/them, she/her, he/him">
            </div>
            <div class="form-group">
                <label for="left-club">Club:</label>
                <input type="text" id="left-club" placeholder="Enter club name">
            </div>
        </div>

        <!-- Right Fencer -->
        <div class="fencer-panel right-panel">
            <h3>Fencer on the Right</h3>
            <div class="form-group">
                <label for="right-dropdown">Previous Fencers:</label>
                <select id="right-dropdown">
                    <option value="none">Fencer (BFC) -- Pronouns</option>
                </select>
            </div>
            <div class="form-group">
                <label for="right-name">Name:</label>
                <input type="text" id="right-name" placeholder="Enter fencer's name">
            </div>
            <div class="form-group">
                <label for="right-pronouns">Pronouns:</label>
                <input type="text" id="right-pronouns" placeholder="e.g., they/them, she/her, he/him">
            </div>
            <div class="form-group">
                <label for="right-club">Club:</label>
                <input type="text" id="right-club" placeholder="Enter club name">
            </div>
        </div>
    </div>

    <div class="actions">
        <button id="clear-btn" type="submit" class="clear-btn">Clear All</button>
        <button id="update-btn" type="submit">Update Fencer Info</button>
    </div>

    <div id="status" class="status"></div>
    <script src="scripts/fencer-info.js" />
</body>
</html>
